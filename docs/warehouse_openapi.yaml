openapi: 3.0.3
info:
  title: Warehouse Management API
  version: 1.0.0
  description: API для системы управления складом (с поддержкой ролей Admin/User)
paths:
  /api/v1/items:
    get:
      summary: Получить каталог товаров
      description: Доступно ролям User и Admin
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Item'
    post:
      summary: Добавить новый товар в каталог
      description: Доступно только роли Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemCreateRequest'
      responses:
        '201':
          description: Товар успешно создан
        '403':
          description: Доступ запрещен (необходима роль Admin)

  /api/v1/items/{itemId}:
    get:
      summary: Получить информацию о товаре и его текущем остатке
      description: Доступно ролям User и Admin
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemDetails'
        '404':
          description: Товар не найден

  /api/v1/items/{itemId}/movements:
    post:
      summary: Оформить приход или расход товара
      description: Доступно только роли Admin
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MovementRequest'
      responses:
        '200':
          description: Операция успешно выполнена
        '400':
          description: Ошибка валидации (например, попытка списать больше, чем есть на складе)
        '403':
          description: Доступ запрещен (необходима роль Admin)
    get:
      summary: Получить историю движения товара
      description: Доступно ролям User и Admin
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MovementRecord'

components:
  schemas:
    Item:
      type: object
      properties:
        id:
          type: integer
          example: 101
        sku:
          type: string
          example: "KEYB-001"
        name:
          type: string
          example: "Механическая клавиатура"
        category:
          type: string
          example: "Электроника"

    ItemCreateRequest:
      type: object
      required:
        - sku
        - name
        - minStockLevel
      properties:
        sku:
          type: string
        name:
          type: string
        category:
          type: string
        minStockLevel:
          type: integer
          description: Уровень остатка, при котором нужно отправить уведомление (Kafka)
          example: 5

    ItemDetails:
      allOf:
        - $ref: '#/components/schemas/Item'
        - type: object
          properties:
            currentStock:
              type: integer
              example: 42

    MovementRequest:
      type: object
      required:
        - type
        - quantity
      properties:
        type:
          type: string
          enum: [RECEIPT, WRITEOFF]
          description: "RECEIPT - приход, WRITEOFF - списание"
        quantity:
          type: integer
          minimum: 1
          example: 10
        comment:
          type: string
          example: "Поступление от поставщика"

    MovementRecord:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [RECEIPT, WRITEOFF]
        quantity:
          type: integer
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
          description: "Username администратора, выполнившего операцию"
        comment:
          type: string
