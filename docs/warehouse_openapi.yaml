openapi: 3.0.3
info:
  title: Warehouse Management API
  version: 1.0.0
  description: API для системы управления складом (с поддержкой ролей Admin/User)
paths:
  /api/v1/items:
    get:
      summary: Получить каталог товаров
      description: Доступно ролям User и Admin
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Item'
    post:
      summary: Добавить новый товар в каталог
      description: Доступно только роли Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemCreateRequest'
      responses:
        '201':
          description: Товар успешно создан
        '403':
          description: Доступ запрещен (необходима роль Admin)

  /api/v1/items/{itemId}:
    get:
      summary: Получить информацию о товаре и его текущем остатке
      description: Доступно ролям User и Admin
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemDetails'
        '404':
          description: Товар не найден

    put:
      summary: Обновить информацию о товаре
      description: Доступно только Admin. SKU изменить нельзя. Требуется полная замена (все поля обязательны).
      operationId: updateItem
      tags:
        - items
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateItemRequest'
      responses:
        '200':
          description: Товар успешно обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemDetails'
        '400':
          description: Неверный запрос (отрицательный minStock, пустая строка или отсутствует обязательное поле)
        '401':
          description: Не авторизован (отсутствует или недействительный токен)
        '403':
          description: Доступ запрещен (необходима роль Admin)
        '404':
          description: Товар не найден или неактивен (is_active = false)

  /api/v1/items/{itemId}/movements:
    post:
      summary: Оформить приход или расход товара
      description: Доступно только роли Admin
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MovementRequest'
      responses:
        '201':
          description: Операция успешно выполнена
        '400':
          description: Ошибка валидации (например, попытка списать больше, чем есть на складе)
        '403':
          description: Доступ запрещен (необходима роль Admin)
    get:
      summary: Получить историю движения товара
      description: Доступно ролям User и Admin
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MovementRecord'

components:
  schemas:
    Item:
      type: object
      description: "Базовая информация о товаре"
      properties:
        id:
          type: integer
          format: int64
          description: "Уникальный идентификатор товара"
          example: 101
        sku:
          type: string
          maxLength: 100
          description: "Уникальный артикул товара"
          example: "KEY-001"
        name:
          type: string
          maxLength: 255
          description: "Название товара"
          example: "Механическая клавиатура"
        category:
          type: string
          maxLength: 100
          description: "Категория товара"
          example: "Электроника"
        minStock:
          type: integer
          description: "Минимальный уровень остатка для уведомлений"
          example: 5
        active:
          type: boolean
          description: "Флаг активности товара (true - активен, false - снят с учета/архив)"
          example: true
        createdAt:
          type: string
          format: date-time
          description: "Дата и время создания записи"
          example: "2023-10-25T10:00:00Z"
        updatedAt:
          type: string
          format: date-time
          description: "Дата и время последнего обновления записи"
          example: "2023-10-26T12:30:00Z"

    ItemCreateRequest:
      type: object
      required:
        - sku
        - name
        - category
        - minStock
      properties:
        sku:
          type: string
          maxLength: 100
          description: "Уникальный артикул товара"
          example: "KEY-256"
        name:
          type: string
          maxLength: 255
          description: "Название товара"
          example: "Механическая клавиатура"
        category:
          type: string
          maxLength: 100
          description: "Категория товара"
          example: "Электроника"
        minStock:
          type: integer
          minimum: 0
          description: "Минимальный уровень остатка, при котором нужно отправить уведомление (Kafka)"
          example: 5

    UpdateItemRequest:
      type: object
      description: "Данные для обновления товара. SKU изменить нельзя."
      required:
        - name
        - category
        - minStock
      properties:
        name:
          type: string
          description: "Название товара"
          example: "Ноутбук Dell"
        category:
          type: string
          description: "Категория товара"
          example: "Электроника"
        minStock:
          type: integer
          minimum: 0
          description: "Минимальный уровень остатка"
          example: 10

    ItemDetails:
      allOf:
        - $ref: '#/components/schemas/Item'
        - type: object
          properties:
            currentStock:
              type: integer
              format: int32
              description: "Текущее количество товара на складе"
              example: 42

    MovementRequest:
      type: object
      required:
        - type
        - quantity
      properties:
        type:
          type: string
          enum:
            - RECEIVE
            - WRITE_OFF
          description: "RECEIVE - приход, WRITE_OFF - списание"
        quantity:
          type: integer
          minimum: 1
          example: 10
        comment:
          type: string
          example: "Поступление от поставщика"

    MovementRecord:
      type: object
      properties:
        id:
          type: integer
          format: int64
        type:
          type: string
          enum:
            - RECEIVE
            - WRITE_OFF
        quantity:
          type: integer
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
          description: "Username администратора, выполнившего операцию"
        comment:
          type: string