services:

  # -- Базы данных --
  postgres:
    image: postgres:16
    container_name: postgres
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -t 10 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
    env_file:
      - .env
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -- Kafka --
  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.11
    container_name: kafka
    ports:
      - "9092:9092"   # OUTSIDE: для хоста/IDE
      - "29092:29092" # PLAINTEXT: для других контейнеров
      - "8081:8081"   # Schema Registry
    command: >
      redpanda start
      --smp 1
      --overprovisioned
      --node-id 0
      --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      --advertise-kafka-addr PLAINTEXT://kafka:29092,OUTSIDE://localhost:9092
      --schema-registry-addr 0.0.0.0:8081
      --mode dev-container
    healthcheck:
      test: [ "CMD", "rpk", "cluster", "info" ]
      interval: 15s
      timeout: 10s
      retries: 10

  # -- Приложение --
  warehouse-app:
    build: .
    container_name: warehouse-app
    ports:
      - "${SERVER_PORT}:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    
volumes:
  postgres_data:
  redis_data: