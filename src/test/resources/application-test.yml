spring:
  datasource:
    url: jdbc:tc:postgresql:16:///warehouse_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
  kafka:
    consumer:
      group-id: warehouse-alerts-test
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.warehouse.event"
        spring.json.value.default.type: "com.warehouse.dto.event.LowStockAlertEvent"

app:
  jwt:
    secret: test-secret-key-that-is-at-least-256-bits-long
    expiration-ms: 86400000