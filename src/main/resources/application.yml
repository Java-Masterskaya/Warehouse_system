# yaml-language-server: $schema=https://json.schemastore.org/spring-configuration-properties.json
spring:
  application:
    name: warehouse-app
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        allow.auto.create.topics: false
    consumer:
      group-id: warehouse-alerts
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.warehouse.dto.event"
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  kafka:
    topics:
      low-stock:
        name: low-stock-alerts
        partitions: 3
        replicas: 1

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: WARN
    com.warehouse: INFO